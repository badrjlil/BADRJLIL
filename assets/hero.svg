<svg width="100%" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Badr JLIL — Software Engineer, Casablanca, Morocco">
  <style>
    text { font-family: 'Segoe UI', Ubuntu, 'Helvetica Neue', sans-serif; }
    .mono { font-family: 'Cascadia Code', Consolas, 'Courier New', monospace; }
    .float-a { animation: drift 14s ease-in-out infinite; }
    .float-b { animation: drift 18s ease-in-out infinite reverse; }
    .float-c { animation: drift 22s ease-in-out infinite; }
    @keyframes drift {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(38px, -24px); }
    }
    .star { animation: twinkle 3.2s ease-in-out infinite; }
    .s2 { animation-delay: .5s; } .s3 { animation-delay: 1s; }
    .s4 { animation-delay: 1.5s; } .s5 { animation-delay: 2s; }
    .s6 { animation-delay: 2.5s; }
    @keyframes twinkle { 0%, 100% { opacity: .12; } 50% { opacity: .9; } }
    .role { opacity: 0; animation: cycle 16s linear infinite; }
    .r2 { animation-delay: 4s; } .r3 { animation-delay: 8s; } .r4 { animation-delay: 12s; }
    @keyframes cycle {
      0% { opacity: 0; } 3% { opacity: 1; } 21% { opacity: 1; }
      25% { opacity: 0; } 100% { opacity: 0; }
    }
    .cursor { animation: blink 1.1s steps(1) infinite; }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16161e"/>
      <stop offset="1" stop-color="#1f2335"/>
    </linearGradient>
    <linearGradient id="name" x1="380" y1="150" x2="820" y2="230" gradientUnits="userSpaceOnUse">
      <stop stop-color="#bb9af7"/>
      <stop offset=".5" stop-color="#7aa2f7"/>
      <stop offset="1" stop-color="#7dcfff"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#bb9af7"/>
      <stop offset=".5" stop-color="#7aa2f7"/>
      <stop offset="1" stop-color="#7dcfff"/>
    </linearGradient>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#3b4261" stroke-width="1" opacity=".16" fill="none"/>
    </pattern>
    <clipPath id="round"><rect width="1200" height="420" rx="18"/></clipPath>
  </defs>
  <g clip-path="url(#round)">
    <rect width="1200" height="420" fill="url(#bg)"/>
    <rect width="1200" height="420" fill="url(#grid)"/>

    <!-- Aurora blobs -->
    <g filter="url(#soft)">
      <circle class="float-a" cx="180" cy="90" r="150" fill="#bb9af7" opacity=".16"/>
      <circle class="float-b" cx="1030" cy="330" r="170" fill="#7dcfff" opacity=".14"/>
      <circle class="float-c" cx="980" cy="70" r="110" fill="#7aa2f7" opacity=".13"/>
      <circle class="float-b" cx="240" cy="360" r="120" fill="#9ece6a" opacity=".07"/>
    </g>

    <!-- Stars -->
    <circle class="star"    cx="140" cy="200" r="1.8" fill="#c0caf5"/>
    <circle class="star s2" cx="320" cy="80"  r="1.4" fill="#c0caf5"/>
    <circle class="star s3" cx="530" cy="60"  r="1.8" fill="#c0caf5"/>
    <circle class="star s4" cx="760" cy="90"  r="1.4" fill="#c0caf5"/>
    <circle class="star s5" cx="940" cy="180" r="1.8" fill="#c0caf5"/>
    <circle class="star s6" cx="1100" cy="120" r="1.4" fill="#c0caf5"/>
    <circle class="star s3" cx="420" cy="350" r="1.6" fill="#c0caf5"/>
    <circle class="star s5" cx="860" cy="330" r="1.6" fill="#c0caf5"/>
    <circle class="star s2" cx="1060" cy="250" r="1.4" fill="#c0caf5"/>
    <circle class="star s4" cx="80"  cy="310" r="1.4" fill="#c0caf5"/>

    <!-- Faint code braces -->
    <text x="60" y="290" class="mono" font-size="190" fill="#565f89" opacity=".10">{</text>
    <text x="1050" y="290" class="mono" font-size="190" fill="#565f89" opacity=".10">}</text>

    <!-- Top meta -->
    <text x="40" y="50" class="mono" font-size="15" fill="#565f89">~/badr-jlil</text>
    <text x="1160" y="50" text-anchor="end" class="mono" font-size="15" fill="#565f89">Casablanca, Morocco</text>

    <!-- Name -->
    <text x="600" y="200" text-anchor="middle" font-size="94" font-weight="800" letter-spacing="6" fill="url(#name)">BADR JLIL</text>
    <text x="600" y="246" text-anchor="middle" font-size="20" letter-spacing="10" fill="#a9b1d6">SOFTWARE ENGINEER</text>

    <!-- Rotating specialties -->
    <g class="mono" font-size="19">
      <text class="role"    x="600" y="300" text-anchor="middle" fill="#7dcfff" font-family="'Cascadia Code', Consolas, monospace">« Backend &amp; System Architecture — Spring Boot · NestJS »</text>
      <text class="role r2" x="600" y="300" text-anchor="middle" fill="#bb9af7" font-family="'Cascadia Code', Consolas, monospace">« Full-Stack Web — Next.js · React · TypeScript »</text>
      <text class="role r3" x="600" y="300" text-anchor="middle" fill="#9ece6a" font-family="'Cascadia Code', Consolas, monospace">« Mobile — Kotlin · Jetpack Compose »</text>
      <text class="role r4" x="600" y="300" text-anchor="middle" fill="#e0af68" font-family="'Cascadia Code', Consolas, monospace">« AI &amp; Computer Vision — Python · YOLOv8 · OpenCV »</text>
    </g>

    <!-- Prompt -->
    <text x="40" y="388" class="mono" font-size="15">
      <tspan fill="#9ece6a">badr@casablanca</tspan><tspan fill="#565f89">:~$</tspan><tspan fill="#a9b1d6"> building systems that scale </tspan><tspan class="cursor" fill="#7dcfff">▌</tspan>
    </text>
    <text x="1160" y="388" text-anchor="end" class="mono" font-size="14" fill="#565f89">v2026.07</text>

    <!-- Bottom accent bar -->
    <rect y="414" width="1200" height="6" fill="url(#bar)"/>
  </g>
</svg>
