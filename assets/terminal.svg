<svg width="100%" viewBox="0 0 550 310" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Badr.kt — code card">
  <style>
    .bg { fill: #1a1b26; }
    .header { fill: #24283b; }
    .tab { fill: #1a1b26; }
    .tab-text { font-family: 'Segoe UI', sans-serif; font-size: 13px; fill: #a9b1d6; }
    .line-num { font-family: Consolas, monospace; font-size: 14px; fill: #414868; text-anchor: end; }
    .code { font-family: Consolas, monospace; font-size: 14px; fill: #a9b1d6; }
    .bar-text { font-family: Consolas, monospace; font-size: 11px; fill: #a9b1d6; }

    /* Syntax Highlighting (Tokyo Night) */
    .keyword { fill: #bb9af7; font-style: italic; }
    .class { fill: #7dcfff; }
    .property { fill: #7aa2f7; }
    .string { fill: #9ece6a; }
    .type { fill: #2ac3de; }
    .punct { fill: #89ddff; }

    /* Window Controls */
    .close { fill: #ff5f56; }
    .min { fill: #ffbd2e; }
    .max { fill: #27c93f; }

    /* Line-by-line reveal */
    .ln { opacity: 0; animation: reveal .45s ease-out forwards; }
    .l1 { animation-delay: .2s; }  .l2 { animation-delay: .5s; }
    .l3 { animation-delay: .8s; }  .l4 { animation-delay: 1.1s; }
    .l5 { animation-delay: 1.4s; } .l6 { animation-delay: 1.7s; }
    .l7 { animation-delay: 2s; }   .l8 { animation-delay: 2.3s; }
    .l9 { animation-delay: 2.6s; } .l10 { animation-delay: 2.9s; }
    @keyframes reveal { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: translateX(0); } }

    .cursor { opacity: 0; animation: blink 1.1s steps(1) 3.4s infinite; }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  </style>

  <!-- Window Background -->
  <rect width="100%" height="100%" rx="8" ry="8" class="bg" />

  <!-- Header Bar -->
  <rect width="100%" height="40" rx="8" ry="8" class="header" />
  <rect y="30" width="100%" height="10" class="header" />

  <!-- Window Controls -->
  <circle cx="20" cy="20" r="6" class="close" />
  <circle cx="40" cy="20" r="6" class="min" />
  <circle cx="60" cy="20" r="6" class="max" />

  <!-- Tab: Badr.kt -->
  <path d="M 80 40 L 80 10 Q 80 5 85 5 L 200 5 Q 205 5 205 10 L 205 40 Z" class="tab" />
  <text x="100" y="25" class="tab-text">Badr.kt</text>
  <rect x="80" y="40" width="125" height="2" fill="#7aa2f7" />

  <!-- Content Area -->
  <g transform="translate(15, 68)">

    <!-- Line Numbers -->
    <g transform="translate(25, 0)">
      <text x="0" y="0"   class="line-num ln l1">1</text>
      <text x="0" y="20"  class="line-num ln l2">2</text>
      <text x="0" y="40"  class="line-num ln l3">3</text>
      <text x="0" y="60"  class="line-num ln l4">4</text>
      <text x="0" y="80"  class="line-num ln l5">5</text>
      <text x="0" y="100" class="line-num ln l6">6</text>
      <text x="0" y="120" class="line-num ln l7">7</text>
      <text x="0" y="140" class="line-num ln l8">8</text>
      <text x="0" y="160" class="line-num ln l9">9</text>
      <text x="0" y="180" class="line-num ln l10">10</text>
    </g>

    <!-- Code -->
    <g transform="translate(45, 0)">
      <text x="0" y="0" class="code ln l1"><tspan class="keyword">data class</tspan> <tspan class="class">Engineer</tspan><tspan class="punct">(</tspan></text>

      <text x="20" y="20" class="code ln l2"><tspan class="keyword">val</tspan> <tspan class="property">name</tspan><tspan class="punct">:</tspan> <tspan class="type">String</tspan> <tspan class="punct">=</tspan> <tspan class="string">"Badr JLIL"</tspan><tspan class="punct">,</tspan></text>

      <text x="20" y="40" class="code ln l3"><tspan class="keyword">val</tspan> <tspan class="property">role</tspan><tspan class="punct">:</tspan> <tspan class="type">String</tspan> <tspan class="punct">=</tspan> <tspan class="string">"Software Engineer"</tspan><tspan class="punct">,</tspan></text>

      <text x="20" y="60" class="code ln l4"><tspan class="keyword">val</tspan> <tspan class="property">base</tspan><tspan class="punct">:</tspan> <tspan class="type">String</tspan> <tspan class="punct">=</tspan> <tspan class="string">"Casablanca, MA"</tspan><tspan class="punct">,</tspan></text>

      <text x="20" y="80" class="code ln l5"><tspan class="keyword">val</tspan> <tspan class="property">stack</tspan><tspan class="punct">:</tspan> <tspan class="type">List</tspan><tspan class="punct">&lt;</tspan><tspan class="type">String</tspan><tspan class="punct">&gt;</tspan> <tspan class="punct">=</tspan> <tspan class="keyword">listOf</tspan><tspan class="punct">(</tspan></text>

      <text x="40" y="100" class="code ln l6"><tspan class="string">"Spring Boot"</tspan><tspan class="punct">,</tspan> <tspan class="string">"Next.js"</tspan><tspan class="punct">,</tspan> <tspan class="string">"Kotlin"</tspan><tspan class="punct">,</tspan></text>
      <text x="40" y="120" class="code ln l7"><tspan class="string">"TypeScript"</tspan><tspan class="punct">,</tspan> <tspan class="string">"Python"</tspan><tspan class="punct">,</tspan> <tspan class="string">"Docker"</tspan></text>

      <text x="20" y="140" class="code ln l8"><tspan class="punct">),</tspan></text>

      <text x="20" y="160" class="code ln l9"><tspan class="keyword">val</tspan> <tspan class="property">status</tspan><tspan class="punct">:</tspan> <tspan class="type">String</tspan> <tspan class="punct">=</tspan> <tspan class="string">"Open to Work 🟢"</tspan></text>

      <text x="0" y="180" class="code ln l10"><tspan class="punct">)</tspan><tspan class="cursor" fill="#7dcfff">▌</tspan></text>
    </g>
  </g>

  <!-- Status Bar -->
  <path d="M 0 284 L 550 284 L 550 302 Q 550 310 542 310 L 8 310 Q 0 310 0 302 Z" class="header" />
  <text x="15" y="298" class="bar-text"><tspan fill="#7aa2f7">⎇ main</tspan></text>
  <text x="90" y="298" class="bar-text" fill="#9ece6a">✓ compiled</text>
  <text x="535" y="298" text-anchor="end" class="bar-text" fill="#565f89">Kotlin · UTF-8 · Ln 10, Col 2</text>
</svg>
